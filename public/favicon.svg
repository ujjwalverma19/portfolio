<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Solid Editorial Background -->
  <rect width="512" height="512" fill="#0A0A0A" />
  
  <!-- Elegant Thin Inner Frame -->
  <rect x="32" y="32" width="448" height="448" fill="none" stroke="rgba(255, 255, 255, 0.08)" stroke-width="2" />
  <rect x="40" y="40" width="432" height="432" fill="none" stroke="rgba(255, 255, 255, 0.04)" stroke-width="1" />

  <!-- Monogram Group (centered, thin elegant strokes) -->
  <g stroke="#FFFFFF" stroke-linecap="square" stroke-linejoin="miter">
    <!-- U Shape -->
    <path d="M 175 190 L 175 295 C 175 330 200 345 230 345 C 260 345 260 330 260 295 L 260 190" stroke-width="5" fill="none" />
    <!-- V Shape (touches U slightly for editorial monogram feel) -->
    <path d="M 280 190 L 315 345 L 350 190" stroke-width="5" fill="none" />
    
    <!-- Serif Details (thin horizontal caps) -->
    <path d="M 163 190 L 187 190" stroke-width="2" />
    <path d="M 248 190 L 272 190" stroke-width="2" />
    <path d="M 268 190 L 292 190" stroke-width="2" />
    <path d="M 338 190 L 362 190" stroke-width="2" />
  </g>
</svg>